<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>FORKT Panel</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Font Awesome -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  />

  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="forkt-panel">

  <!-- HEADER -->
  <header class="panel-header">
    <h1>FORKT PANEL</h1>
    <div class="panel-subtitle">OFFICIAL WEB FORKT</div>
  </header>

  <!-- INFORMATION -->
<section class="info-box">

  <div class="info-row">
    <div class="info-left">
      <i class="fa-solid fa-code-branch icon"></i>
      <span>Latest Version</span>
    </div>
    <b id="versionText" class="value">checking...</b>
  </div>

  <div class="info-row">
    <div class="info-left">
      <i class="fa-solid fa-signal icon"></i>
      <span>Status</span>
    </div>
    <b id="statusBadge" class="badge">Loading</b>
  </div>

  <div class="info-row">
    <div class="info-left">
      <i class="fa-solid fa-user-shield icon"></i>
      <span>Account Type</span>
    </div>
    <b id="vipStatus" class="badge">Checking...</b>
  </div>
</section>

  <!-- CHANGELOG -->
<section class="notes-box">
  <h2 class="section-title">
    <i class="fa-solid fa-list-check"></i>
    <span>Changelog</span>
  </h2>

  <ul id="notesList">
    <li>
      <i class="fa-solid fa-spinner fa-spin"></i>
      Loading...
    </li>
  </ul>
</section>

  <!-- DOWNLOAD -->
  <button id="downloadBtn" class="download-btn" disabled>
    <i class="fa-solid fa-download"></i>
    <span>Download</span>
 </button>
  <div class="download-progress">
   <div class="progress-bar">
     <div class="progress-fill" id="progressFill"></div>
   </div>
  <span id="progressText">0%</span>
</div>
  <!-- STATUS -->
  <p id="statusText" class="status-text">
  <i class="fa-solid fa-clock"></i>
  Checking latest version...
</p>

<!-- FOOTER -->
<footer class="footer">
  <div class="social-links">
    <a href="https://t.me/forktch" target="_blank" class="social-btn telegram">
      <i class="fa-brands fa-telegram"></i>
      Telegram
    </a>

    <a href="https://whatsapp.com/channel/0029VazhfIiJf05jBKkGKe1F" target="_blank" class="social-btn whatsapp">
      <i class="fa-brands fa-whatsapp"></i>
      WhatsApp
    </a>
  </div>
  <div class="credits">
    ©Credits By <span>@sukitovone</span>
  </div>
</footer>

</div>

<script src="app.js"></script>
</body>
</html>
